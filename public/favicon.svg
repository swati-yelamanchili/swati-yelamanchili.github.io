<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#000"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#00ff9c" stroke-width="2" opacity="0.3"/>
  <text x="32" y="42" text-anchor="middle" font-family="monospace" font-weight="700" font-size="28" fill="#00ff9c" filter="url(#glow)">SY</text>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
